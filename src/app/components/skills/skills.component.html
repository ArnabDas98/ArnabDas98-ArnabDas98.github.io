<section id="skills" class="section">
  <div class="container">
    <h2 class="section-title">Technical Skills</h2>
    <div class="skills-grid">
      <div class="card skill-category" *ngFor="let category of skillCategories">
        <h3>{{ category.title }}</h3>
        <div class="skills-list">
          <span class="skill-badge" *ngFor="let skill of category.skills">{{ skill }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
